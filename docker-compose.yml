version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: todo_hub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: todohub
      POSTGRES_PASSWORD: todohub_secret
      POSTGRES_DB: todo_hub
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U todohub -d todo_hub']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: todo_hub_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@todohub.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
